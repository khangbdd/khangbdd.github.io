baseURL = "https://khangbdd.github.io/"
languageCode = "en-us"
title = "Khang's Blog"
theme = "PaperMod"

[params]
  description = "Khang's personal blog"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true

  [params.profileMode]
    enabled = true
    Title = "Hi, I'm Khang 👋"
    subtitle = "Welcome to my personal blog."
    imageUrl = "images/avatar-kaka.jpg"
    imageTitle = "Kaka"
    imageWidth = 180
    imageHeight = 180

    [[params.profileMode.buttons]]
      name = "Posts"
      url = "/posts/"

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10
